// ── GAME LOGIC ─────────────────────────────────────────────
function stopTimer(){clearInterval(S.timer);clearTimeout(S.fbto);}
function startTimer(){
  S.tLeft=35;stopTimer();
  S.timer=setInterval(()=>{
    S.tLeft--;
    const tw=document.getElementById('tw');
    if(tw){const p=(S.tLeft/35)*100;const c=S.tLeft>15?'#00AEEF':S.tLeft>7?'#FFA500':'#FF4444';tw.style.width=p+'%';tw.style.background=c;}
    if(S.tLeft<=0){stopTimer();handleTimeout();}
  },1000);
}

function handleTimeout(){
  if(S.showFb)return;
  const q=S.qs[S.qi];
  S.picked=-1;S.showFb=true;S.streak=0;
  S.answers.push({q:q[0],ok:false,pts:0,ua:'No answer',ca:q[q[5]+1],ex:q[6]});
  showFb(false,'Time\'s up!',q[6]);
  [0,1,2,3].forEach(i=>{const el=document.getElementById('op'+i);if(el){el.disabled=true;if(i===q[5])el.classList.add('ok');}});
  S.fbto=setTimeout(advance,1800);
}

function handlePick(idx){
  if(S.picked!==null||S.showFb)return;
  stopTimer();
  const q=S.qs[S.qi];
  const ok=idx===q[5];
  const ns=ok?S.streak+1:0;
  const mult=ns>=5?2:ns>=3?1.5:1;
  const pts=ok?Math.floor((100+Math.floor((S.tLeft/35)*50))*mult):0;
  S.picked=idx;S.showFb=true;S.streak=ns;
  if(ok)S.score+=pts;
  S.answers.push({q:q[0],ok,pts,ua:q[idx+1],ca:q[q[5]+1],ex:q[6]});
  [0,1,2,3].forEach(i=>{const el=document.getElementById('op'+i);if(el){el.disabled=true;if(i===q[5])el.classList.add('ok');else if(i===idx&&!ok)el.classList.add('ng');}});
  const sc=document.getElementById('sc');if(sc)sc.textContent='⭐ '+S.score.toLocaleString();
  showFb(ok,ok?'Correct!':'Not quite.',q[6]);
  S.fbto=setTimeout(advance,1800);
}

function showFb(ok,label,expl){
  const el=document.getElementById('fb');
  if(el)el.innerHTML=`<div class="fbx ${ok?'fok':'fng'}"><strong>${ok?'&#9989;':'&#10060;'} ${label}</strong> ${h(expl)}</div>`;
}

function advance(){
  S.showFb=false;S.picked=null;
  const next=S.qi+1;
  if(next>=S.qs.length){endRound();}
  else{S.qi=next;renderQuiz();startTimer();}
}

function endRound(){
  saveLb(S.name,S.score,S.cat.name,S.answers);
  S.scr='results';renderResults();
}

function startQuiz(cat){
  S.cat=cat;
  const bank=QB[cat.id]||[];
  if(!bank.length){
    app().innerHTML=`${hdr('goCategories()')}<div class="card" style="text-align:center"><div style="font-size:48px;margin-bottom:12px">&#9888;&#65039;</div><h2 style="margin-top:0">Questions not found</h2><p style="color:#666;font-size:14px;margin-bottom:20px">The question bank for <strong>${h(cat.name)}</strong> could not be loaded.</p><button class="pb" onclick="goCategories()">&#8592; Back to Categories</button></div>`;
    return;
  }
  const avoid=S.lastUsed[cat.id]||[];
  let pool=bank.filter(q=>!avoid.includes(q[0]));
  if(pool.length<QN)pool=bank;
  S.qs=shuffle(pool).slice(0,Math.min(QN,pool.length)).map(shuffleOptions);
  S.lastUsed[cat.id]=S.qs.map(q=>q[0]);
  S.qi=0;S.score=0;S.streak=0;S.answers=[];S.picked=null;S.showFb=false;
  S.scr='quiz';renderQuiz();startTimer();
}

// ── NAVIGATION ─────────────────────────────────────────────
function goHome(){stopTimer();S.scr='home';renderHome();}
function goPlay(){S.scr=S.name?'categories':'name';S.name?renderCategories():renderName();}
function goCategories(){S.scr='categories';renderCategories();}
function goLb(){S.scr='leaderboard';renderLeaderboard();}
function setName(){const v=document.getElementById('ni')?.value?.trim();if(v){S.name=v;goCategories();}}
function pickCat(id){const c=CATS.find(x=>x.id===id);if(c)startQuiz(c);}
function setPeriod(p){S.period=p;renderLeaderboard();}

// ── MANAGER TOOLS ──────────────────────────────────────────
let MGR_DATA=null;
function goManagerLogin(){
  app().innerHTML=`${hdr('goLb()')}<div class="card"><h2 style="margin-top:0">&#128274; Manager Tools</h2><p style="color:#666;font-size:14px;margin:4px 0 0">Enter the manager passcode to continue</p><input type="password" id="mp" placeholder="Passcode" onkeydown="if(event.key==='Enter')checkManagerPass()"><button class="pb" onclick="checkManagerPass()">Enter</button></div>`;
  setTimeout(()=>document.getElementById('mp')&&document.getElementById('mp').focus(),100);
}
function checkManagerPass(){
  const v=document.getElementById('mp')?.value;
  if(v===MANAGER_PASS){renderManager();}
  else{alert('Incorrect passcode.');}
}
async function renderManager(){
  app().innerHTML=`${hdr('goLb()')}<div class="inner" style="padding-top:16px"><div style="text-align:center;padding:48px 20px;color:#888"><div style="font-size:40px;margin-bottom:12px">&#9203;</div><p style="font-size:14px">Loading manager data...</p></div></div>`;
  MGR_DATA=await fetchAll();
  renderManagerView();
}
function renderManagerView(){
  const sc=MGR_DATA.scores||{};
  const key=lbKey();
  const board=sc[key]||[];
  app().innerHTML=`${hdr('goLb()')}
<div class="inner">
  <h2 style="margin-top:12px">&#128274; Manager Tools</h2>
  <div class="lt">
    <button class="ltb ${S.period==='monthly'?'on':'off'}" onclick="setMgrPeriod('monthly')">Monthly</button>
    <button class="ltb ${S.period==='weekly'?'on':'off'}" onclick="setMgrPeriod('weekly')">Weekly</button>
  </div>
  ${board.length===0?`<div style="text-align:center;padding:30px;color:#bbb"><p>No scores in this period.</p></div>`:`<div class="ll">${board.map((e,i)=>`<div class="lr" style="display:flex;align-items:center"><div style="flex:1;min-width:0"><p style="margin:0;font-weight:700;font-size:14px;color:#0A52A0">${h(e.name)}</p><p style="margin:0;font-size:11px;color:#aaa">${h(e.cat)} &middot; ${new Date(e.date).toLocaleDateString()}</p></div><span style="font-weight:800;color:#0A52A0;font-size:15px;margin-right:10px">${e.score.toLocaleString()}</span><button class="sb" style="width:auto;padding:6px 12px;margin:0;font-size:12px" onclick="viewAnswers(${i})">View</button></div>`).join('')}</div>`}
  <div style="margin-top:24px;padding-top:16px;border-top:1px solid #ddd">
    <p class="sl" style="margin-bottom:10px">CLEAR SCORES</p>
    <button class="sb" onclick="clearBoard('weekly')">Clear This Week</button>
    <button class="sb" onclick="clearBoard('monthly')">Clear This Month</button>
    <button class="sb" style="border-color:#DC3545;color:#DC3545;margin-top:8px" onclick="clearBoard('all')">Clear Everything</button>
  </div>
</div>`;
}
function setMgrPeriod(p){S.period=p;renderManagerView();}
function viewAnswers(idx){
  const sc=MGR_DATA.scores||{};
  const key=lbKey();
  const board=sc[key]||[];
  const e=board[idx];
  if(!e||!e.answers){alert('No detailed answer breakdown is available for this score.');return;}
  app().innerHTML=`${hdr('renderManagerView()')}
<div class="inner">
  <h2 style="margin-top:12px">${h(e.name)}&#39;s Round</h2>
  <p class="sub" style="margin-bottom:10px">${h(e.cat)} &middot; ${e.score.toLocaleString()} pts &middot; ${new Date(e.date).toLocaleDateString()}</p>
  <div style="background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(10,82,160,.08)">
    <div class="rv" style="max-height:none">${e.answers.map(a=>`<div class="rvi"><p style="font-size:13px;font-weight:600;margin:0 0 3px">${a.ok?'&#9989;':'&#10060;'} ${h(a.q)}</p><p style="font-size:12px;color:#999;margin:0">Answered: ${h(a.ua)}${!a.ok?` &middot; Correct: ${h(a.ca)}`:''}</p></div>`).join('')}</div>
  </div>
  ${pbtn('&#8592; Back','renderManagerView()')}
</div>`;
}
async function clearBoard(period){
  const label=period==='all'?'ALL leaderboard history (every week and month on record)':(period==='weekly'?'this week\'s scores':'this month\'s scores');
  if(!confirm('Are you sure you want to clear '+label+'? This cannot be undone.'))return;
  try{
    const data=await fetchAll();
    const sc=data.scores||{};
    if(period==='all'){Object.keys(sc).forEach(k=>delete sc[k]);}
    else if(period==='weekly'){delete sc[weekKey()];}
    else{delete sc[monthKey()];}
    await fetch(JBURL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JBKEY},body:JSON.stringify({scores:sc})});
    alert('Scores cleared.');
    renderManager();
  }catch(e){alert('Something went wrong. Please try again.');console.error(e);}
}

renderHome();
</script>
