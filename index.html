["Jungfraujoch in Switzerland is marketed to tourists under which nickname?","Roof of the Alps","Top of Europe","Peak of Dreams","Crown of Switzerland",1,"Jungfraujoch is marketed as the Top of Europe, a high-altitude rail destination offering spectacular Alpine views."],
["Which Swiss city, known for its lake and covered wooden bridge, is a popular stop alongside Alpine excursions?","Geneva","Lucerne","Zurich","Basel",1,"Lucerne, with its picturesque lake and historic covered Chapel Bridge, is a popular stop alongside Swiss Alpine excursions."],
["River cruising in Europe, such as along the Rhine or Danube, is popular with travellers seeking:","Fast-paced backpacking","A relaxed way to see multiple cities and scenery without repacking","Beach holidays only","Desert safaris",1,"River cruising offers a relaxed way to see multiple European cities and scenic countryside without the hassle of repacking and changing hotels."],
["Contiki holidays in Europe are specifically marketed toward which traveller group?","Retirees only","Young travellers seeking a social, group touring experience","Business travellers only","Families with infants",1,"Contiki is specifically marketed toward young travellers wanting a social, group-based touring experience across Europe."],
["What is a key appeal of a coach touring holiday across multiple European countries?","It only visits one city","It allows travellers to see multiple countries and highlights in one organised itinerary without self-driving","It requires a pilots licence","It is limited to Eastern Europe only",1,"Coach touring lets travellers see multiple countries and highlights in one organised itinerary, without the stress of self-driving."],
["Which European country is renowned for its diverse regional cuisines, from pasta in the south to risotto in the north?","Spain","Italy","Portugal","Belgium",1,"Italy is celebrated for its diverse regional cuisines, ranging from southern pasta dishes to northern risotto specialities."],
["The Eiffel Tower, one of the world's most visited monuments, is located in which European city?","London","Rome","Paris","Berlin",2,"The Eiffel Tower is one of the world's most visited monuments, located in the heart of Paris."],
["Why might a consultant recommend a guided tour over independent travel for a first-time European visitor with limited time?","Guided tours are always cheaper","A guided itinerary maximises sightseeing efficiency and removes the logistics burden from the traveller","Independent travel is illegal in Europe","Guided tours have no real benefit",1,"A guided itinerary maximises sightseeing efficiency and removes the planning and logistics burden for a time-limited first-time visitor."],
["Which European country is particularly associated with windmills, tulip fields and canal cities like Amsterdam?","Belgium","The Netherlands","Denmark","Germany",1,"The Netherlands is famous for its windmills, vibrant tulip fields and picturesque canal cities such as Amsterdam."]
],
us:[
["South African visitors to the USA must obtain which document before travel?","A US tourist visa from the embassy","An ESTA (Electronic System for Travel Authorization)","No documentation needed","A US visa on arrival",1,"South Africans qualify for the Visa Waiver Program and must obtain an approved ESTA before departure."],
["The ESTA allows South Africans to stay in the USA for a maximum of:","30 days","60 days","90 days","6 months",2,"The ESTA permits stays of up to 90 days per visit for tourism or business."],
["The approximate flight time from Johannesburg to New York with one stop is:","10 hours","14 hours","15 to 17 hours","20 hours",2,"Most routings connect via a European or Middle Eastern hub, making the total journey approximately 15 to 17 hours."],
["The ESTA costs approximately:","Free","USD 14","USD 50","USD 160",1,"The ESTA costs approximately USD 14, is valid for 2 years or until passport expiry and covers multiple trips."],
["The Grand Canyon is located in which US state?","Utah","Nevada","Arizona","Colorado",2,"The Grand Canyon, one of the worlds great natural wonders, is in northern Arizona."],
["Walt Disney World, the worlds most visited theme park resort, is located in:","Miami","Houston","Los Angeles","Orlando",3,"Walt Disney World Resort is situated in Orlando, Florida and welcomes millions of visitors annually."],
["What driving document should South African clients carry for a US road trip alongside their SA licence?","A US driving licence","No additional document","International Driver Permit","Only a credit card for car hire",2,"An International Driver Permit (IDP) is recommended alongside the valid South African driving licence for car hire in the USA."],
["Do South African clients transiting through a US airport need an ESTA?","No, transit does not require any document","Yes, even airside transit requires a valid ESTA or US visa","Only if staying overnight","Only if connecting to a non-US destination",1,"The USA requires a valid ESTA or visa even for airside transit without leaving the airport terminal."],
["The Statue of Liberty in New York Harbor was a gift from which country?","England","Italy","France","Spain",2,"The Statue of Liberty was gifted by France and dedicated on 28 October 1886."],
["Route 66 famously stretches from Chicago to which US city?","San Francisco","Miami","Los Angeles","Dallas",2,"Historic Route 66 runs approximately 3,940 km from Chicago, Illinois to Santa Monica in Los Angeles."],
["For a client interested in both Hollywood culture and beach lifestyle, which US city is recommended?","New York","Miami","Los Angeles","San Diego",2,"Los Angeles combines Hollywood, beaches at Santa Monica and Malibu, theme parks and year-round sunshine."],
["Hawaii is a US state located in which ocean?","Atlantic","Pacific","Indian","Caribbean",1,"Hawaii is a US state in the North Pacific Ocean, approximately 3,500 km from the US west coast."],
["The main international gateway airport for New York City is:","LaGuardia Airport","Newark Liberty International","JFK International Airport","Teterboro Airport",2,"JFK International is the primary airport for international arrivals to New York City."],
["Which US city is known as Music City and the home of country music?","Austin","Memphis","Nashville","New Orleans",2,"Nashville, Tennessee is the global capital of country music and home to the Grand Ole Opry."],
["A fly-drive holiday in the USA is best suited to clients who want:","To stay in one city","To cover multiple destinations at their own pace by rental car","Business travel","Fully guided group tours",1,"Fly-drive packages suit clients wanting the freedom to explore at their own pace across multiple US destinations."],
["Which iconic American national park is known for Old Faithful, its famous geyser?","Yellowstone","Yosemite","Zion","Grand Teton",0,"Yellowstone National Park is famous worldwide for Old Faithful and its geothermal features."],
["San Franciscos most famous bridge, often photographed shrouded in fog, is called:","Bay Bridge","Golden Gate Bridge","Brooklyn Bridge","George Washington Bridge",1,"The Golden Gate Bridge is San Franciscos most iconic landmark, often photographed emerging through fog."],
["Las Vegas is located in which US state?","Arizona","California","Nevada","Utah",2,"Las Vegas is located in the state of Nevada."],
["Which US city is most associated with jazz music and Mardi Gras celebrations?","Nashville","Memphis","New Orleans","Austin",2,"New Orleans is famous worldwide for jazz music and its vibrant annual Mardi Gras celebrations."],
["The Empire State Building and Times Square are landmarks of which US city?","Chicago","New York City","Boston","Philadelphia",1,"The Empire State Building and Times Square are two of New York Citys most iconic landmarks."],
["Which US state offers dramatic glacier and wilderness landscapes popular with nature-focused travellers?","Florida","Alaska","Texas","Arizona",1,"Alaska offers dramatic glaciers, fjords and wilderness landscapes, hugely popular for nature-focused itineraries and cruises."],
["Broadway, the centre of American theatre, is located in which city?","Los Angeles","Chicago","New York City","Boston",2,"Broadway, home to world-famous theatre productions, is located in New York City."],
["The Florida Everglades is best known for which unique ecosystem?","Alpine forest","A vast subtropical wetland teeming with wildlife including alligators","A desert canyon","A coral reef",1,"The Florida Everglades is a vast subtropical wetland ecosystem, famous for alligators and rich biodiversity."],
["Which long-distance hiking trail stretches along the Appalachian Mountains in the eastern USA?","The Pacific Crest Trail","The Appalachian Trail","The Continental Divide Trail","The John Muir Trail",1,"The Appalachian Trail is a famous long-distance hiking trail running along the Appalachian Mountains in the eastern USA."],
["Which US state is particularly popular for skiing destinations such as Aspen and Vail?","Florida","Colorado","Texas","Louisiana",1,"Colorado is home to renowned ski destinations such as Aspen and Vail, popular with winter sports travellers."],
["Many South African clients combine a USA trip with a visit to which neighbouring country to experience destinations like Niagara Falls or Banff?","Mexico","Canada","Cuba","Greenland",1,"Canada, home to Niagara Falls and Banff, is a popular add-on for South African clients already visiting the USA."],
["What is a popular way for visitors to learn about Native American heritage while travelling in the USA?","Visiting Native American cultural centres and reservations","There are no such opportunities","Only through museums in Europe","It is not something tourists can experience",0,"Native American cultural centres and reservations across the USA offer visitors a way to learn directly about Indigenous heritage."],
["Niagara Falls, a major natural attraction near the USA-Canada border, is most famous for:","Its desert scenery","Its powerful waterfalls straddling the US-Canada border","Its coral reefs","Its ski slopes",1,"Niagara Falls is famous for its powerful waterfalls straddling the border between the USA and Canada."],
["Why might a consultant suggest combining New York City with a national park like Yellowstone in one USA itinerary?","It is not possible to combine city and nature in the USA","It offers a contrast between vibrant city life and dramatic natural wilderness in one trip","Only one type of experience is allowed per visa","National parks are closed to international tourists",1,"Combining a city like New York with a national park like Yellowstone offers a compelling contrast between urban energy and natural wilderness."],
["Which iconic American skyline is most associated with the Hollywood sign and the entertainment industry?","New York City","Los Angeles","Chicago","Miami",1,"Los Angeles, home to the Hollywood sign, is the heart of the American entertainment and film industry."]
],
sk:[
["The Three Valleys in France (the worlds largest ski area) connects:","Verbier, Zermatt and Saas-Fee","Courchevel, Meribel and Val Thorens","Chamonix, Morzine and Avoriaz","Tignes, Val d Isere and Les Arcs",1,"Les Trois Vallees links Courchevel, Meribel and Val Thorens with over 600 km of marked pistes."],
["Which Swiss ski resort sits at the foot of the iconic Matterhorn?","Verbier","St Moritz","Davos","Zermatt",3,"Zermatt is world-famous for its car-free village and stunning Matterhorn backdrop in the Swiss Valais."],
["The main European Alpine ski season typically runs from:","October to December","December to April","January and February only","November to January",1,"The main season runs December to April with peak conditions generally January to March."],
["Ski in / ski out accommodation means:","Free ski lessons are included","Equipment is included in the rate","Guests can ski directly from their door to the pistes without a transfer","The property has an on-site ski shop",2,"Ski in/ski out properties offer direct slope access from the building, a premium feature in ski resorts."],
["Courchevel 1850 in France is best described as:","A budget-friendly family resort","One of the worlds most glamorous and expensive ski destinations","The best resort for beginners","A snowboard-only park",1,"Courchevel 1850 is a byword for ski glamour, attracting celebrities and ultra-high-net-worth travellers."],
["Apres-ski refers to:","Pre-ski warm-up exercises","Advanced ski technique","Social activities, drinks and entertainment enjoyed after skiing for the day","The last ski run of the afternoon",2,"Apres-ski is the social scene in resort bars and restaurants after the lifts close."],
["In European ski resorts, the easiest (beginner) run colour is:","Blue","Green","Red","Black",1,"European resorts use green for the easiest runs, followed by blue, red and black for the most difficult."],
["Travel insurance for a ski holiday must specifically include:","Standard cover only","No cover is needed in European resorts","Winter sports and ski cover, which standard travel insurance does not include","Medical cover only",2,"Standard travel insurance excludes skiing injuries; specific winter sports cover must be added to the policy."],
["A catered ski chalet differs from a self-catered chalet in that:","There is no meaningful difference","A catered chalet has a resident host providing daily meals; self-catered means guests cook for themselves","Catered means breakfast only","Self-catered is always the more expensive option",1,"Catered chalets include a chalet host who provides breakfast, afternoon tea, canapes and dinner daily."],
["Verbier in Switzerland is primarily suited to which skill level?","Complete beginners only","Young children learning to ski","Confident intermediate and advanced skiers","Snowboarders only",2,"Verbier is known for demanding off-piste terrain and is best suited to confident intermediate and expert skiers."],
["For a first-time ski family from South Africa, the best resort type is:","The most challenging off-piste resort available","A purpose-built French resort with a proper ski school and beginner areas","A summer resort that also does some winter activities","A snowboard-only park",1,"Purpose-built French resorts like La Plagne, Les Gets or Morzine have purpose-designed nursery areas and reputable ski schools."],
["The approximate flight time from Johannesburg to Geneva (main Alpine gateway) is:","7 hours","11 hours","14 hours","16 hours",1,"The direct flight from Johannesburg to Geneva takes approximately 11 hours."],
["Off-piste skiing means skiing:","On specially marked advanced runs","On groomed prepared slopes only","On ungroomed terrain outside the marked and patrolled piste network","Only during poor visibility",2,"Off-piste skiing takes place on natural ungroomed terrain beyond the prepared slopes."],
["Late February to March is popular for ski holidays because:","It is always the cheapest time","Early season snow is at its best","Accumulated snow depth is good and days are noticeably longer with more sunshine","Resorts are always less crowded",2,"Late season offers reliable deep snow built up over winter and increasingly sunny longer spring days."],
["Morzine in France is part of which large cross-border ski area?","The Three Valleys","Espace Killy","Portes du Soleil","Grand Massif",2,"Morzine is part of the Portes du Soleil, one of Europes largest ski areas spanning the French-Swiss border."],
["Which French resort hosted the 1992 Winter Olympics, cementing the regions status as a major ski destination?","Chamonix","Albertville","Courchevel","Megeve",1,"Albertville hosted the 1992 Winter Olympics, with events spread across the surrounding French Alps resorts."],
["What term describes a mountain hut or restaurant where skiers can stop for food on the slopes?","Chalet","Mountain restaurant or refuge","Gondola","Piste map",1,"A mountain restaurant or refuge is a hut or eatery on the slopes where skiers can stop to eat during the day."],
["Which piece of safety equipment is essential for off-piste skiing, used to locate a skier buried in snow?","Ski poles","Avalanche transceiver (beacon)","Goggles","Helmet camera",1,"An avalanche transceiver, or beacon, is essential off-piste safety equipment used to locate a buried skier quickly."],
["What is a piste map used for?","Booking lift passes","Showing the layout and difficulty of marked runs on a ski resort","Tracking weather forecasts","Measuring snow depth",1,"A piste map shows the layout, difficulty and connections of all marked runs across a ski resort."],
["Which country is home to the ski resort of Whistler, popular with North American skiers?","USA","Canada","Switzerland","New Zealand",1,"Whistler Blackcomb is located in British Columbia, Canada and co-hosted the 2010 Winter Olympics."],
["Club Med is well known in the ski industry for offering which type of resort experience?","Self-catering budget chalets only","All-inclusive ski resorts with meals, lessons and equipment often bundled together","Camping-only ski experiences","Ski resorts with no dining options",1,"Club Med is known for all-inclusive ski resorts where meals, lessons and often equipment hire are bundled into one simple package."],
["Which essential item should consultants remind first-time skiers to pack or hire, beyond standard ski gear?","Swimwear only","Good quality thermal base layers and gloves for warmth","Summer hiking boots","A wetsuit",1,"Good quality thermal base layers and warm gloves are essential for comfort on the slopes, beyond just standard ski gear."],
["Which Italian ski region is popular for combining skiing with charming alpine villages and excellent food?","Sicily","The Dolomites or Italian Alps (e.g. Pragelato, Sestriere)","The Italian Riviera","Tuscany",1,"The Dolomites and Italian Alps regions, including resorts like Pragelato and Sestriere, combine skiing with charming villages and renowned food."],
["Why might travel consultants recommend booking ski holidays well in advance?","Prices and availability are unaffected by timing","Popular resorts and accommodation can sell out, especially over peak weeks like school holidays","Late bookings are always cheaper","Ski resorts have unlimited capacity",1,"Popular ski resorts and accommodation can sell out well in advance, particularly during peak weeks such as school holidays."],
["What is the benefit of an all-inclusive ski package that bundles lift passes, lessons and meals?","It removes all flexibility","It simplifies budgeting and planning, particularly valuable for first-time ski families","It is always more expensive than self-organising","It has no real benefit",1,"Bundled packages simplify budgeting and planning, which is particularly valuable for first-time ski families unfamiliar with all the costs involved."],
["Which type of insurance add-on is essential to mention specifically for clients booking a ski holiday?","Standard travel insurance is always sufficient","Winter sports cover, as standard policies typically exclude skiing injuries","No insurance is needed for skiing","Only health insurance, not travel insurance",1,"Winter sports cover is essential, as standard travel insurance policies typically exclude skiing-related injuries."],
["What should consultants tell first-time skiers about ski lessons?","Lessons are unnecessary for anyone","Group or private lessons with a qualified instructor are strongly recommended for safety and progression","Lessons are only for children","Lessons are banned for adults",1,"Group or private lessons with a qualified instructor are strongly recommended for both safety and steady skill progression."],
["Why might a consultant suggest layering clothing for a ski holiday rather than one heavy coat?","Layering has no benefit","Layering allows better temperature regulation as activity levels and weather change throughout the day","It is purely a fashion choice","Only one layer is ever needed",1,"Layering allows skiers to adjust to changing temperatures and activity levels throughout the day far more effectively than one heavy coat."],
["What is a common non-skiing activity offered at many European ski resorts for non-skiing companions?","No alternative activities exist","Spa treatments, sleigh rides, ice skating or simply enjoying the village atmosphere","Surfing lessons","Desert safaris",1,"Spa treatments, sleigh rides, ice skating and the village atmosphere itself give non-skiing companions plenty to enjoy."],
["Why is travel insurance with medical evacuation cover particularly important for ski holidays?","It has no relevance to skiing","Mountain injuries may require specialist evacuation or repatriation, which can be extremely costly without cover","Evacuation is always free in Europe","Ski resorts provide free medical care to all visitors",1,"Mountain injuries can require costly specialist evacuation or repatriation, making medical evacuation cover especially important for ski holidays."]
],
cr:[
["Royal Caribbean International is best described as:","A luxury small-ship cruise line","One of the worlds largest mass-market cruise lines","A river cruise specialist","A South Africa-based line",1,"Royal Caribbean is one of the worlds biggest cruise companies, known for innovative mega-ships."],
["Standard cruise pricing typically includes:","Everything including all shore excursions","Accommodation, most meals and onboard entertainment; drinks, speciality dining and excursions are usually extra","The cabin only","Drinks and the cabin only",1,"Standard cruise fares bundle cabin, buffet and main restaurant dining and onboard shows; drinks packages and excursions are charged separately."],
["The difference between an inside and a balcony cabin is:","No meaningful difference","Inside cabins are larger","Inside cabins have no window or natural light; balcony cabins have a private outdoor terrace","Balcony cabins are located below the waterline",2,"Inside cabins have no windows; balcony staterooms have sliding glass doors opening onto a private outdoor space."],
["The port of embarkation is:","The final port on the itinerary","Where passengers board the ship at the start of the voyage","The ships country of registration","The deepest port on the route",1,"The embarkation port is where the cruise begins; popular options for South Africans include Barcelona, Miami and Southampton."],
["Shore excursions on a cruise are:","Walks on the ships outer deck","Organised tours and activities when the ship docks at a port","Swims from the stern of the ship","Transfers between ships",1,"Shore excursions are trips and activities at each port of call, bookable through the cruise line or independently."],
["The Mediterranean cruise season broadly runs:","Year-round","January to March","April to October","December only",2,"Mediterranean cruises operate April to October with peak season June to September."],
["Norwegian Cruise Line (NCL) pioneered which concept?","Formal black-tie dining every night","Adults-only ships exclusively","Freestyle Cruising with no fixed dining times or dress codes","River cruising",2,"NCL revolutionised cruising with Freestyle Cruising, allowing passengers to dine anywhere anytime without formal requirements."],
["A tender port is one where:","The weather is always calm","The ship docks directly","The ship anchors offshore and small boats ferry passengers ashore and back","Medical facilities are available ashore",2,"At tender ports the water is too shallow for the ship to dock; passengers are ferried to land by the ships tender boats."],
["On-Board Credit (OBC) is:","A credit card for use ashore","A cash refund after the cruise","A credit loaded onto the passenger shipboard account for onboard spending","A promotional discount on the cabin",2,"OBC is a credit available for use on drinks, speciality dining, spa treatments or shore excursions."],
["For a couple celebrating a milestone anniversary wanting elegance and intimacy, the best recommendation is:","Carnival (party atmosphere)","MSC (family focused)","A luxury small-ship line such as Silversea or Seabourn","Norwegian (freestyle casual)",2,"Luxury small-ship lines carry under 600 guests, offer highly personalised service and are ideal for milestone occasions."],
["A repositioning cruise offers good value because:","The ship has a new captain","The itinerary is shorter","The ship is moving between deployment regions seasonally, offering longer voyages at reduced one-way rates","A different entertainment team is onboard",2,"Repositioning cruises are priced below regular sailings because they are one-directional and operationally necessary."],
["A cruise and stay package combines:","Permanent residency on a ship","A cruise with hotel nights pre or post-voyage at the departure or destination port","A stay in a cruise terminal hotel only","A cruise with unlimited port calls",1,"Cruise and stay packages are popular for South Africans wanting to explore an embarkation city like Barcelona before sailing."],
["For a family with young children, which cruise lines have the most comprehensive kids programmes?","Silversea and Seabourn","Cunard and Princess","MSC, Royal Caribbean and Norwegian","Azamara and Oceania",2,"MSC, Royal Caribbean and Norwegian are well known for extensive age-grouped childrens clubs and family-friendly cabin configurations."],
["Port taxes on a cruise booking are:","A service charge added by the cruise line","Government-imposed fees for using port facilities, passed directly to passengers","A voluntary tip for port staff","A tourist departure tax paid on return",1,"Port taxes and fees are mandatory government charges for using port facilities at each destination port of call."],
["Celebrity Cruises is positioned in the market as:","A budget family cruise line","A river cruise specialist","A premium cruise line with a refined design-led experience","The worlds largest cruise brand",2,"Celebrity Cruises offers a more sophisticated experience than mass-market lines, with elevated dining, design and service standards."],
["What is a muster drill on a cruise ship?","A dining reservation system","A mandatory safety briefing and assembly point exercise","An onboard talent show","A captains welcome reception",1,"A muster drill is a mandatory safety briefing where passengers learn assembly points and procedures in case of emergency."],
["What does the term fly-cruise mean?","A cruise with a pool shaped like wings","A package combining a flight to the embarkation port with a cruise","A cruise with onboard flight simulators","A river cruise only",1,"A fly-cruise package combines flights to the embarkation port with the cruise itself, sold as one combined booking."],
["Which deck of a cruise ship typically has the least motion, important for guests prone to seasickness?","The highest deck at the front","A mid-ship, lower deck","The rear (aft) upper deck","It makes no difference",1,"Mid-ship, lower deck cabins experience the least motion, making them the best choice for guests prone to seasickness."],
["What is the term for the daily programme listing onboard activities, dining times and entertainment on a cruise?","The Manifest","The Cruise Compass or Daily Planner","The Itinerary Card","The Voyage Log",1,"The Cruise Compass, or equivalent daily planner, lists all onboard activities, dining times and entertainment for each day."],
["MSC Cruises, popular with South African clients sailing from Durban, is headquartered in which country?","Italy","Switzerland","Norway","USA",1,"MSC Cruises is headquartered in Geneva, Switzerland, despite its strong Italian heritage and branding."],
["What are gratuities on a cruise typically used for?","Port taxes","Daily tips covering services from housekeeping and dining staff, often prepaid or charged automatically","Fuel surcharges","Entertainment booking fees",1,"Gratuities are daily tips covering housekeeping and dining staff services, often added automatically or paid in advance."],
["Which three cruise lines are most commonly highlighted as top mass-market brands for South African clients?","Disney, Costa and AIDA","MSC, Norwegian Cruise Line and Royal Caribbean","Seabourn, Silversea and Regent","Star Clippers, Windstar and Ponant",1,"MSC, Norwegian Cruise Line and Royal Caribbean are consistently among the top mass-market cruise brands booked by South African clients."],
["What is the key difference between an ocean cruise and a river cruise?","There is no difference","River cruises sail along inland waterways through cities, while ocean cruises sail between coastal or island ports","River cruises only operate in winter","Ocean cruises never visit ports",1,"River cruises travel along inland waterways through cities, while ocean cruises sail between coastal or island ports."],
["Which river cruise companies are known for their scenic European river itineraries along rivers like the Rhine and Danube?","Royal Caribbean and Carnival","Uniworld and U River Cruises","MSC and NCL","Disney Cruise Line",1,"Uniworld and U River Cruises are well known for scenic European river itineraries along rivers such as the Rhine and Danube."],
["What is a key consideration when helping a client choose a cabin category?","All cabins are identical regardless of price","Location, view, space and budget all affect the right cabin choice for that clients needs","Cabin choice has no impact on the cruise experience","Only the cheapest cabin should ever be recommended",1,"Location, view, space and budget all genuinely affect which cabin category best suits a particular clients needs and priorities."],
["Why might a consultant recommend booking shore excursions through the cruise line rather than independently?","Cruise line excursions guarantee the ship will not leave without you if there are delays","Independent excursions are always better","Cruise line excursions are always more expensive with no benefit","There is no difference in risk",0,"Cruise line excursions guarantee the ship will wait if the excursion is delayed, removing the risk of being left behind at port."],
["What is a key advantage of cruising for first-time international travellers?","It requires extensive independent trip planning","It bundles accommodation, meals, entertainment and transport between destinations into one simple booking","It only visits one destination","It is always more expensive than independent travel",1,"Cruising bundles accommodation, meals, entertainment and transport between multiple destinations into one simple, low-hassle booking."],
["Which cruise line is particularly well known for sailing from Durban, making it convenient for South African passengers?","Disney Cruise Line","MSC Cruises","Princess Cruises","Holland America Line",1,"MSC Cruises is particularly well known for operating sailings from Durban, making it highly convenient for South African passengers."],
["What should consultants clarify with clients about onboard dining when comparing cruise lines?","All cruise lines offer identical dining","Dining styles vary, from fixed traditional dining times to flexible freestyle dining across multiple venues","Dining is never included in cruise pricing","Only buffet dining exists on cruise ships",1,"Dining styles vary significantly between cruise lines, from fixed traditional sittings to flexible freestyle dining across multiple venues."],
["Why might travel insurance be especially important to recommend for a cruise booking?","Cruises carry no risk","Cruises often involve significant upfront payment, multiple ports and potential itinerary changes, all worth protecting","Cruise lines automatically refund everything","Insurance is not available for cruises",1,"Cruises often involve significant upfront payment and exposure to itinerary changes, making travel insurance an important recommendation."]
],
af:[
["Victoria Falls sits on the border between which two countries?","Zimbabwe and Mozambique","Zimbabwe and Zambia","Zambia and Botswana","Zimbabwe and South Africa",1,"Victoria Falls (Mosi-oa-Tunya) straddles the Zimbabwe and Zambia border on the Zambezi River."],
["The local name Mosi-oa-Tunya for Victoria Falls translates to:","The Great Waterfall","The River of Life","The Smoke that Thunders","The Falls of the Zambezi",2,"Mosi-oa-Tunya is the Tonga name meaning The Smoke that Thunders, referring to the spray visible for kilometres."],
["Which side of Victoria Falls generally offers the best frontal views of the main curtain?","Zambia side (Livingstone)","Both sides are identical","Neither side has good views","Zimbabwe side (Victoria Falls town)",3,"The Zimbabwe side offers comprehensive frontal views; the Zambia side is better for the Devils Pool experience."],
["The best time to visit Victoria Falls for peak water flow and drama is:","July to September","October to November","March to May","December to January",2,"March to May sees maximum flow following the rainy season, creating the most thunderous spray and drama."],
["The main flight gateway from South Africa to Victoria Falls is:","Durban","Cape Town","Johannesburg","Pretoria",2,"Most connections to both the Zimbabwe and Zambia sides of Victoria Falls route through Johannesburg."],
["Ponta do Ouro in Mozambique is best described as:","The capital of Mozambique","The southernmost Mozambique coastal destination, popular for long weekend escapes by 4x4 from South Africa","A major island resort","A deep sea fishing charter hub only",1,"Ponta do Ouro sits just over the South African border and is popular for diving, dolphins and weekend self-drive trips."],
["Which town is the main gateway for accessing the Bazaruto Archipelago?","Maputo","Beira","Vilankulos","Inhambane",2,"Vilankulos is the departure point for flights and boat transfers to the Bazaruto Archipelago islands."],
["The Bazaruto Archipelago is primarily known for:","Budget backpacker beaches","Industrial fishing","Luxury island lodges and pristine marine life including dugongs","City tourism",2,"The Bazaruto Archipelago offers some of Africas finest island lodge experiences with world-class snorkelling, diving and fishing."],
["Which is the largest island in the Bazaruto Archipelago?","Benguerra Island","Magaruque Island","Santa Carolina","Bazaruto Island",3,"Bazaruto Island is the largest in the archipelago, known for freshwater lakes, dunes and diverse birdlife."],
["The Quirimbas Archipelago in northern Mozambique is best positioned to clients as:","A budget family beach destination","A remote ultra-exclusive destination with pristine reefs and rich Swahili and Arab trading history","A well-developed resort area","A water sports training hub",1,"The Quirimbas is one of Africas most exclusive remote island destinations with centuries of trading history."],
["The Great Migration in Kenyas Masai Mara is most spectacular between:","January to March","April to June","July to October","November to December",2,"The wildebeest migration reaches the Masai Mara roughly July to October, with dramatic Mara River crossings."],
["The Ngorongoro Crater in Tanzania is significant for safaris because:","It is the worlds deepest crater","It is a self-contained ecosystem with one of the highest concentrations of wildlife in Africa","It is only accessible by helicopter","It is only known for birdwatching",1,"The Ngorongoro Crater is a collapsed volcanic caldera forming a natural wildlife enclosure with extraordinary game density."],

["Approximate total flight time from Johannesburg to the Maldives with one connection:","5 hours","9 hours","12 to 14 hours","18 hours",2,"The journey typically takes 12 to 14 hours via Dubai, Doha or Colombo."],

["Which client profile is the Maldives explicitly marketed toward, beyond honeymooners?","Budget backpackers only","Beach lovers, water adventurists, foodies, cocktail enthusiasts and fun-seeking families","Business travellers only","Winter sports enthusiasts",1,"Beyond honeymooners, the Maldives is marketed toward beach lovers, water adventurists, foodies, cocktail enthusiasts and fun-seeking families."],
["Why does the Maldives appeal strongly to clients wanting an exotic but relatively convenient beach escape from South Africa?","It requires a complex multi-visa process","It offers daily flight connections and no visa requirement, combined with a dramatically different tropical island setting","It has no flight connections from South Africa","It is closer to South Africa than any other beach destination",1,"Daily flight connections and no visa requirement, combined with its dramatically different tropical setting, make the Maldives appealing yet convenient."]

["Australias wine region Margaret River is located in which state?","South Australia","Victoria","Western Australia","New South Wales",2,"Margaret River is one of Western Australias premier wine regions, also known for surfing and gourmet food."],
["Which Australian wine region, located in South Australia, is internationally renowned for Shiraz production?","Margaret River","Barossa Valley","Hunter Valley","Yarra Valley",1,"The Barossa Valley in South Australia is internationally renowned for its full-bodied Shiraz wines."],
["K'gari (Fraser Island), the world's largest sand island, is located off the coast of which Australian state?","Western Australia","Queensland","Victoria","Tasmania",1,"K'gari, formerly known as Fraser Island, is the world's largest sand island and is located off the coast of Queensland."],
["Which major Grand Slam tennis tournament is held annually in Melbourne?","Wimbledon","The Australian Open","The US Open","The French Open",1,"The Australian Open, one of tennis's four Grand Slam tournaments, is held annually in Melbourne."],
["Where can travellers reliably see and interact with koalas and kangaroos in a safe, sanctuary setting?","Only in the wild with no facilities","Dedicated wildlife sanctuaries and zoos found in most major Australian cities","Koalas cannot be seen by tourists","Only at Uluru",1,"Dedicated wildlife sanctuaries and zoos in most major Australian cities offer safe, reliable opportunities to see koalas and kangaroos."],
["Which Australian city, known for its river and cultural precincts, is the capital of Queensland?","Cairns","Brisbane","Gold Coast","Townsville",1,"Brisbane, known for its river and vibrant cultural precincts, is the capital city of Queensland."],
["What is the Hunter Valley, located near Sydney, particularly known for?","Skiing","Wine tasting and vineyard tours","Desert safaris","Coral reef diving",1,"The Hunter Valley, near Sydney, is one of Australia's most popular wine regions, known for wine tasting and vineyard tours."],
["Why might consultants advise clients to book Great Barrier Reef tours through reputable, certified operators?","Certification has no relevance","Certified operators follow environmental guidelines that help protect the reef's fragile ecosystem","All operators are identical","Certification only affects price",1,"Certified operators follow environmental guidelines designed to protect the Great Barrier Reef's fragile and valuable ecosystem."],
["Adelaide, the capital of South Australia, is often used as a base for exploring which nearby wine region?","Margaret River","Barossa Valley","Hunter Valley","Mornington Peninsula",1,"Adelaide is commonly used as a convenient base for exploring the nearby Barossa Valley wine region."],
["What should consultants know about driving distances in Australia when planning a multi-stop itinerary?","All major cities are within a short drive of each other","Australia is vast, and distances between major cities or regions can require domestic flights rather than driving","Driving is the only way to travel between cities","Distances are negligible across the country",1,"Australia's vast size means distances between major cities or regions often call for domestic flights rather than long-distance driving."]
],
sam:[
["Thompsons For Travel's South America programme focuses primarily on which two countries?","Peru and Chile","Colombia and Ecuador","Venezuela and Bolivia","Brazil and Argentina",3,"Thompsons South America offering centres on Brazil and Argentina as the primary destinations for South African travellers."],
["The iconic statue Christ the Redeemer stands above which Brazilian city?","Sao Paulo","Salvador","Brasilia","Rio de Janeiro",3,"Cristo Redentor overlooks Rio de Janeiro from the summit of Corcovado Mountain and is one of the worlds most recognisable landmarks."],
["Buenos Aires is often called the Paris of South America because of:","Its tropical climate","Its proximity to France","Its French-speaking population","Its European-influenced architecture, boulevards, culture and culinary scene",3,"Buenos Aires shares Paris's passion for culture, food, fashion and beautiful city architecture, earning it the famous nickname."],
["Which Argentine dance is a must-mention cultural highlight of Buenos Aires?","Salsa","Samba","Merengue","Tango",3,"The Tango originated in Buenos Aires and experiencing it live in a milonga is an iconic Buenos Aires experience."],
["Iguazu Falls can be visited from:","Only the Brazilian side","Only the Argentine side","Only by boat from Paraguay","Both the Brazilian (Foz do Iguacu) and Argentine (Puerto Iguazu) sides",3,"Iguazu Falls straddles the Brazil and Argentina border; both sides offer distinct perspectives."],
["Approximate total flight time from Johannesburg to Buenos Aires with one connection:","8 hours","12 hours","16 to 18 hours","24 hours",2,"Most routings connect via Sao Paulo or a European hub, making the total journey approximately 16 to 18 hours."],
["Patagonia, spanning Argentina and Chile, is best known for:","Tropical beaches and warm weather","Urban nightlife and entertainment","Ancient ruins and city tourism","Dramatic mountain and glacial landscapes, hiking and world-class adventure tourism",3,"Patagonia is one of the worlds premier adventure destinations, with Torres del Paine, Perito Moreno Glacier and stunning wilderness."],
["The Perito Moreno Glacier is a highlight of which Argentine national park?","Iguazu National Park","Tierra del Fuego","Talampaya","Los Glaciares National Park",3,"Perito Moreno in Los Glaciares National Park is one of the worlds few advancing glaciers and a truly spectacular sight."],
["Rio de Janeiro Carnival, the worlds largest, is held annually:","In August","In June to July","In December","Before Lent, typically February or March",3,"Rio Carnival takes place in the days before Lent and draws millions of visitors to the famous Sambadrome parades."],
["The famous urban beaches of Rio de Janeiro are:","Flamengo and Botafogo","Buzios and Paraty","Ilha Grande and Angra","Copacabana and Ipanema",3,"Copacabana and Ipanema are two of the worlds most iconic urban beaches, central to Rio's culture, lifestyle and tourism."],
["The official currency of Brazil is:","Argentine Peso","US Dollar","South American Dollar","Brazilian Real",3,"The Brazilian Real (BRL) is Brazils official currency."],
["The official currency of Argentina is:","Brazilian Real","Chilean Peso","US Dollar","Argentine Peso",3,"The Argentine Peso (ARS) is official, though the US dollar is widely used and advisable to carry due to currency instability."],
["The best time for South Africans to visit South Americas summer highlights is:","June to August","Only in December","Year-round equally","November to March, when South America enjoys summer",3,"Both South America and South Africa are in the Southern Hemisphere; November to March is summer in both."],
["The Atacama Desert, one of the driest places on earth, is located in:","Argentina","Brazil","Bolivia","Chile",3,"The Atacama Desert in northern Chile is one of the worlds most extraordinary landscapes, popular for stargazing and desert tours."],
["The key selling point of combining Brazil and Argentina on one itinerary is:","It is the cheapest option","Both countries speak the same language","The flight between them takes one hour","It covers Rio, Buenos Aires and the option to add Iguazu Falls or Patagonia in one trip",3,"A Brazil and Argentina combination delivers iconic cities, world-class nature and outstanding food and culture in one itinerary."],
["Machu Picchu, one of South Americas most iconic ancient sites, is located in which country?","Bolivia","Peru","Ecuador","Colombia",1,"Machu Picchu, the famous Inca citadel, is located high in the Andes Mountains of Peru."],
["The Amazon Rainforest is primarily located within which South American country, though it spans several?","Colombia","Peru","Brazil","Venezuela",2,"While the Amazon spans several countries, the largest share by far lies within Brazil."],
["Easter Island, famous for its giant stone Moai statues, belongs to which country?","Peru","Chile","Argentina","Ecuador",1,"Easter Island (Rapa Nui), home to the iconic Moai statues, is a territory of Chile in the Pacific Ocean."],
["The Galapagos Islands, famous for unique wildlife studied by Charles Darwin, belong to which country?","Peru","Chile","Ecuador","Colombia",2,"The Galapagos Islands are a province of Ecuador, renowned for the unique wildlife that inspired Darwins theory of evolution."],
["Sao Paulo, Brazils largest city, is primarily known to travellers as:","A beach resort town","A major business and culinary hub rather than a beach destination","A ski destination","A small fishing village",1,"Sao Paulo is Brazils business and cultural capital, celebrated for its food scene and city life rather than beaches."],
["The Uyuni Salt Flats, the world's largest salt flat, are located in which country?","Peru","Bolivia","Chile","Argentina",1,"The Uyuni Salt Flats, the world's largest salt flat, are located in southwestern Bolivia."],
["Ushuaia, often called the End of the World, is a common departure point for cruises to which destination?","The Galapagos Islands","Antarctica","Easter Island","The Amazon",1,"Ushuaia, Argentina, often called the End of the World, is the main departure point for cruises to Antarctica."],
["The historic walled city of Cartagena, known for colourful colonial architecture, is located in which country?","Colombia","Venezuela","Panama","Ecuador",0,"Cartagena, with its colourful colonial architecture and historic walls, is located on Colombia's Caribbean coast."],
["Lima, the capital of Peru, has gained international recognition particularly for its:","Ski resorts","World-class culinary scene","Desert safaris","Ice hockey culture",1,"Lima has gained significant international recognition for its world-class culinary scene, often ranked among the best in the world."],
["The Inca Trail, a multi-day trek ending at Machu Picchu, is located in which country?","Bolivia","Peru","Ecuador","Chile",1,"The Inca Trail, a famous multi-day trek ending at Machu Picchu, is located in Peru."],
["Quito, the capital of Ecuador, is notable for being one of the highest capital cities in the world due to its location in which mountain range?","The Andes","The Rockies","The Alps","The Atlas Mountains",0,"Quito sits high in the Andes mountain range, making it one of the highest capital cities in the world."],
["Which South American country is the primary gateway for visiting the Galapagos Islands?","Peru","Chile","Ecuador","Colombia",2,"Ecuador is the primary gateway for visiting the Galapagos Islands, with most flights departing from Quito or Guayaquil."],
["What is a key consideration when planning high-altitude destinations in South America, such as La Paz or Cusco?","Altitude has no effect on travellers","Clients should be advised about the risk of altitude sickness and given time to acclimatise","Altitude sickness only affects locals","High-altitude destinations should always be avoided entirely",1,"Clients visiting high-altitude destinations like La Paz or Cusco should be advised on altitude sickness risk and given time to acclimatise."],
["Which South American country, alongside Brazil, also celebrates a major Carnival festival with its own distinct style?","Uruguay (Montevideo Carnival)","Suriname","Guyana","French Guiana",0,"Uruguay celebrates its own distinct Carnival in Montevideo, alongside Brazil's world-famous celebrations."],
["What is a key reason consultants should always confirm current entry requirements for multi-country South America itineraries?","All South American countries share identical entry rules","Visa and entry requirements vary by country and nationality, and can change with little notice","No visas are ever required anywhere in South America","Entry requirements never change",1,"Visa and entry requirements vary significantly by country and nationality across South America, and can change with little notice."]
],
lc:[
["What is the industry best-practice maximum first response time for a live chat travel enquiry?","10 minutes","5 minutes","Under 60 seconds","30 minutes",2,"Responding within 60 seconds dramatically reduces the risk of the visitor leaving the site."],
["How many live chat conversations is it best practice to handle simultaneously?","1 only","2 to 3","5 to 7","As many as possible",1,"Handling 2 to 3 simultaneously is optimal; beyond this, response quality and personalisation decline noticeably."],
["When a live chat client finds the price higher than expected, the most effective response is:","Immediately offer a discount","Apologise and end the chat","Acknowledge the concern, highlight the value and explore what matters most to the client","Send them to a competitor",2,"A value-focused response that probes the clients priorities is more effective than reflexively discounting."],
["What are canned responses and why are they useful?","Spam messages to avoid","Pre-written templates for common questions that improve speed and consistency","Computer-generated auto-replies only","Recorded voice messages",1,"Canned responses allow agents to answer common questions quickly and consistently while still personalising the reply."],
["If a live chat query requires significant research time, the best approach is:","Ask the client to phone instead","Leave them waiting with no communication","Acknowledge the query, explain you are researching and give a time estimate","Send a generic brochure link",2,"Honest communication with a realistic timeframe prevents frustration and keeps the client engaged."],
["A professional close to a live chat conversation should always include:","Just closing the window","A summary of what was discussed, confirmed next steps and an offer to reconnect","Only a rating request","An automatic disconnect",1,"A proper close clarifies what was agreed, confirms the next step and leaves the client feeling well looked after."],
["The most appropriate tone for travel live chat is:","Very formal and corporate only","Extremely casual with slang","Warm, helpful and conversational, adapting to the clients tone while remaining professional","Fully scripted throughout",2,"Live chat calls for a conversational warm approach that mirrors the client while maintaining professional knowledge."],
["Proactive chat in a travel website context means:","Sending aggressive promotional messages","An automated invitation to chat triggered when a visitor meets certain conditions (such as 30 seconds on a destination page)","Sending bulk promotional messages","Bot-only responses throughout",1,"Proactive chat invites visitors at a relevant moment in their browsing, increasing the chance of converting passive interest into an enquiry."],
["When a client in live chat is clearly frustrated, what should you do first?","End the chat immediately","Match their tone","Transfer immediately without acknowledgment","Acknowledge their feelings sincerely before attempting to resolve the issue",3,"Clients need to feel heard before they are ready to accept a solution; empathy before problem-solving is the key principle."],
["Once a client in live chat clearly indicates intent to book, you should:","Keep chatting about other destination options","Ask if they want to think about it more","Transfer to a manager","Move efficiently to confirm details and lock in the booking while enthusiasm is at its peak",3,"Buying intent should be acted on promptly; allowing momentum to fade is one of the most common conversion mistakes."],
["The best way to ask about a clients budget in live chat is:","What is your budget? (blunt)","Can you afford a 5-star hotel?","Do not ask about budget at all","To help tailor the best options, do you have a rough budget range in mind?",3,"A value-framed soft approach to budget is far less intrusive and more likely to receive an honest useful response."],
["When a live chat visitor says they are just browsing, the best approach is:","End the chat","Send a full price list","Ask for their email address immediately","Ask where they dream of travelling next to start a genuine conversation",3,"Open-ended aspirational questions engage casual browsers and can convert them into active enquiries without any pressure."],
["What should be gathered early in a live chat travel enquiry?","Credit card details","Destination, travel dates, number of travellers and approximate budget","Home address and employer details","Their name only",1,"Gathering key trip details early enables personalised relevant recommendations rather than generic responses."],
["After a dropped internet connection during a live chat, what is the professional response?","Do nothing and wait","Apologise in a future chat session only","Proactively send a follow-up email acknowledging the interruption and continuing the conversation","Call an unrelated phone number",2,"Reaching out by email after a dropped connection shows professionalism and prevents the client feeling abandoned."],
["What is first contact resolution in the live chat context?","Closing the chat window immediately","The first chat of the working day","Resolving the clients query fully in the initial interaction without needing a follow-up","A promotional response code",2,"First contact resolution means the client leaves the chat with their need fully met, which strongly correlates with satisfaction scores."],
["What does the term queue management refer to in a live chat context?","Managing physical queues at the office","Organising waiting chats so consultants handle them in a fair and timely order","A type of script","An email filter",1,"Queue management ensures incoming chats are distributed and answered fairly and promptly, avoiding long client wait times."],
["Why is it important to avoid copy-pasting long blocks of text into live chat?","It saves time so should always be done","It can feel impersonal and overwhelming to read on a small screen","It is against company policy in all cases","It has no impact on the client experience",1,"Long pasted text feels impersonal and is hard to read on mobile chat windows; shorter, broken-up replies feel more natural."],
["What is sentiment analysis in the context of live chat tools?","A way to detect a customers emotional tone from their messages","A pricing tool","A method for tracking sales","A tool for translating languages",0,"Sentiment analysis tools detect emotional tone in customer messages, helping flag frustration or urgency for faster attention."],
["Which is good practice when a client uses excessive punctuation or capital letters in chat?","Match their tone exactly","Recognise it may signal frustration and respond calmly and empathetically","Ignore it entirely","End the chat immediately",1,"Excessive punctuation or capitals often signal frustration; responding calmly and empathetically helps de-escalate the situation."],
["What should a consultant do if a live chat client asks a question outside their knowledge?","Guess an answer to keep the conversation moving","Be honest, say they will confirm and follow up with accurate information","Ignore the question","End the chat",1,"Honesty paired with a genuine follow-up builds far more trust than guessing and risking incorrect information."],
["What is the benefit of using the clients name occasionally during a live chat conversation?","It is required by company policy","It makes the conversation feel more personal and engaged","It has no real effect","It slows down response time",1,"Using a clients name occasionally makes the conversation feel more personal and shows genuine attention to who you are speaking with."],
["Why should a consultant avoid sending multiple short messages in rapid succession during live chat?","It guarantees faster replies","It can fragment the conversation and overwhelm the client with notifications","It is always the best approach","Clients prefer rapid-fire messages",1,"Sending many rapid short messages can fragment the conversation and overwhelm the client with constant notifications."],
["What does the term average handle time measure in a live chat context?","How long a client waits before the chat opens","The average total time taken to resolve a single chat interaction","The number of chats per day","The cost per chat",1,"Average handle time measures the typical total time taken to fully resolve a single chat interaction from start to finish."],
["Why is it useful to confirm understanding by paraphrasing what a client has said in chat?","It wastes time unnecessarily","It shows the client they have been heard accurately and reduces misunderstandings","It is only needed for complex enquiries","Clients find it irritating",1,"Paraphrasing confirms accurate understanding and shows the client they have genuinely been heard, reducing the risk of misunderstandings."],
["What should a consultant do if a technical issue, such as the chat widget crashing, interrupts a conversation?","Assume the client will start over","Reach out via an alternative channel if possible, referencing the earlier conversation","Do nothing","Mark the enquiry as lost",1,"Reaching out via an alternative channel and referencing the earlier conversation shows professionalism and continuity despite the technical issue."],
["Why is using simple, jargon-free language important in live chat with clients?","Jargon makes the consultant appear more expert","Clients may not understand industry terms, which can cause confusion or distrust","It has no effect on client understanding","Jargon should always be used to sound professional",1,"Clients often dont understand travel industry jargon, which can cause confusion or even distrust if used without explanation."],
["What is a key advantage of live chat over phone calls for many clients?","It always resolves issues faster","It allows clients to multitask and respond at their own convenience while still getting real-time help","It is more personal than a phone call","It eliminates the need for any follow-up",1,"Live chat lets clients multitask and respond at their own pace, while still receiving real-time assistance, unlike a phone call."],
["Why might a consultant use emojis sparingly and selectively in live chat with a travel client?","Emojis are unprofessional and should never be used","Used sparingly, they can add warmth and personality without undermining professionalism","Emojis should be used in every single message","Clients always dislike emojis",1,"Used sparingly and appropriately, emojis can add warmth and personality to a chat without undermining overall professionalism."],
["What is the purpose of a chat transcript being saved and accessible later?","It has no real use","It allows consultants or colleagues to reference exactly what was discussed and agreed, avoiding repetition","It is only used for legal disputes","Transcripts are automatically deleted and never useful",1,"Saved transcripts let consultants or colleagues reference exactly what was discussed and agreed, avoiding the client having to repeat themselves."],
["Why should a consultant resist the urge to send a generic, copy-pasted greeting at the very start of every chat?","Personalised openings, even small ones, set a better tone and show genuine attention","Generic greetings always perform better","It saves no time either way","Clients never notice the difference",0,"Even a small personalised touch at the start of a chat sets a warmer tone and shows the client genuine attention from the first message."]
],
em:[
["The single most important element of a travel sales email is:","A long detailed itinerary","Formal corporate language","A compelling subject line that motivates the recipient to open the email","Company legal disclaimers",2,"The subject line determines whether an email is ever opened; even a perfect email is wasted if it is never read."],
["The recommended length for a travel proposal email is:","As long as possible to show thoroughness","Exactly 500 words","Short enough to read on a mobile, focused on key highlights with an offer to share more detail","One paragraph only",2,"Concise mobile-friendly emails with a single clear call to action consistently outperform long detailed proposals."],
["True personalisation in a travel email means:","Using the clients first name only","Adding a logo","Tailoring the content and recommendations to the clients specific travel history, stated preferences and current enquiry","Using colourful template designs",2,"Meaningful personalisation references the clients past travel, preferences and enquiry context rather than just inserting a name."],
["The recommended follow-up timing after sending a travel quote with no response is:","Immediately upon sending","After 2 weeks","After 2 to 3 business days","Never; wait for the client to respond",2,"Following up after 2 to 3 business days keeps the opportunity alive without feeling intrusive."],
["The most effective subject line format for a Mauritius proposal email is:","Travel Offer August","Important message from Thompsons For Travel","Hi","Your Mauritius Escape - [Month of Departure]",3,"Destination-specific, personalised and evocative subject lines significantly outperform generic alternatives in open rates."],
["A travel quote email should always include:","Just the price","Price, inclusions, exclusions, validity date and a personal recommendation note","A full terms and conditions document only","The itinerary PDF only",1,"A complete quote communicates what is included, what is excluded, when the price expires and a personalised reason to proceed."],
["The best time of the week to send a sales follow-up email for highest open rates is:","Friday afternoon","Sunday evening","Monday early morning","Tuesday to Thursday morning",3,"Research consistently shows Tuesday to Thursday mornings achieve the highest B2C email open rates."],
["A call to action (CTA) in a travel email is:","A company slogan","A legal notice","A request for the client to phone the office","A clear instruction on the readers next step, such as Reply to confirm your dates",3,"Every effective sales email should contain one clear singular call to action guiding the reader toward the desired next step."],
["Why should a price validity date always be included in a travel quote email?","It is a legal requirement only","It creates urgency, manages expectations and protects the consultant if airfares or rates change","It slows down the process","It is not important",1,"A validity date creates a natural reason to act and protects the consultant from being held to a price that is no longer achievable."],
["When a client replies to a quote with a price objection, the most effective response is:","Immediately send a lower quote","Acknowledge their feedback, ask what budget they had in mind and explore which aspects of the trip matter most","Ignore the objection","Apologise and end the email thread",1,"Understanding the specific nature of the objection before adjusting the proposal leads to a better outcome than an immediate discount."],
["A drip email campaign in a travel context is:","Emails about waterfall destinations","A single email with multiple discount tiers","A series of relevant emails delivered over time to nurture a lead from interest through to booking","Emails sent only in rainy weather",2,"A drip sequence guides prospects progressively from inspiration to enquiry to booking through timed relevant content."],
["When emailing a repeat client, the most effective opening references:","The companys founding date","Their previous travel experience booked through you","The latest newsletter","A cold generic introduction",1,"Referencing a clients previous trip signals genuine knowledge of them, immediately building rapport and relevance."],
["What is the preview text in a sales email?","The subject line","An image caption","The footer contact details","The short text visible in the inbox below the subject line before the email is opened",3,"Preview text gives a second opportunity to encourage opens after the subject line and should complement it with additional context."],
["South Africas POPIA legislation is relevant to travel email marketing because:","It requires emails to be in Afrikaans","It governs personal data protection; unsubscribe requests must be honoured immediately","It only applies to international companies","It requires all emails to include a price",1,"POPIA requires responsible handling of personal information; failing to honour unsubscribe requests can result in regulatory action."],
["What makes a travel proposal email stand out above competitors?","Always having the lowest price","Personalisation, evocative destination narrative, quality imagery and clear reasons to book now","Being the longest email","Using company letterhead only",1,"Personalised experience-focused proposals consistently outperform generic price-list-style emails in conversion."],
["What is A/B testing in email marketing?","Sending two slightly different versions of an email to see which performs better","A type of antivirus check","A method for compressing images","A spam filter",0,"A/B testing compares two email variations to see which performs better, helping refine subject lines and content over time."],
["What does an email open rate measure?","How many people replied","How many people received the email","The percentage of recipients who opened the email","How long an email took to send",2,"Open rate measures the percentage of recipients who opened an email, a key indicator of subject line effectiveness."],
["Why should a travel consultant avoid using ALL CAPITALS in an email subject line?","It increases open rates","It can look like shouting or spam, reducing trust and deliverability","It has no effect at all","It is required by law",1,"All capital subject lines often read as shouting or spam, which can reduce trust and hurt email deliverability."],
["What is the purpose of a signature block in a professional travel sales email?","Decoration only","To provide contact details and reinforce professionalism and brand consistency","It is optional and rarely used","To replace the need for a greeting",1,"A signature block provides essential contact details and reinforces a professional, consistent brand impression."],
["When attaching a quote document to an email, what is best practice?","Send it as an unlabelled file","Use a clear, descriptive file name such as the clients name and destination","Always password protect every file","Never attach documents",1,"A clear descriptive file name makes it easy for the client to find and reference the quote later, improving the overall experience."],
["What is the purpose of segmenting an email list by destination interest or past travel history?","It has no real benefit","It allows more relevant, targeted content to be sent to each group, improving engagement","It is required by law","It only matters for very large companies",1,"Segmenting by interest or history allows far more relevant, targeted content to be sent, which consistently improves engagement."],
["Why is it important to proofread a travel proposal email carefully before sending?","Spelling and grammar errors can undermine the clients confidence in the consultants attention to detail","Clients never notice small errors","Proofreading is unnecessary for short emails","It only matters for international clients",0,"Errors can undermine a clients confidence in the consultants attention to detail, which matters greatly for a significant purchase like travel."],
["What does click-through rate measure in email marketing?","How many emails bounced","The percentage of recipients who clicked a link within the email","How many people unsubscribed","The total number of emails sent",1,"Click-through rate measures the percentage of recipients who clicked a link within the email, indicating real engagement beyond just opening."],
["Why might a consultant include a client testimonial or past success story in a travel proposal email?","It is purely decorative","Social proof can build trust and reassure a hesitant client that the destination or experience is worth booking","Testimonials have no impact on decision making","It replaces the need for a clear itinerary",1,"Social proof from testimonials or past successes builds trust and helps reassure a hesitant client that the experience is genuinely worthwhile."],
["What is the risk of sending the exact same generic proposal email to every enquiry, regardless of what the client asked for?","There is no risk","It can feel impersonal and may not address the clients specific questions, reducing trust and conversion","It always performs better than personalised emails","Clients prefer generic templates",1,"A generic, unaddressed proposal can feel impersonal and may miss the clients actual questions, reducing both trust and conversion."],
["Why should a consultant avoid overloading an email with too many destination options at once?","More options are always better","Too many choices can overwhelm a client and delay a decision, known as choice overload","It has no psychological effect","Clients always want maximum choice",1,"Offering too many options at once can overwhelm a client and delay their decision, a well documented effect known as choice overload."],
["What is the benefit of including a clear next step at the very end of a proposal email, even if a CTA is mentioned earlier?","It is repetitive and unnecessary","Reinforcing the next step at the close ensures the client doesnt miss it after reading the details","It confuses the reader","It should be left out entirely",1,"Reinforcing the next step at the close ensures the client doesnt miss it after reading through all the proposal details."],
["Why is mobile-friendly email formatting particularly important for travel consultants?","Most clients only use desktop computers","A large proportion of clients open emails on their phones, so poor formatting can lose their attention quickly","Mobile formatting has no impact on engagement","It is only relevant for international clients",1,"A large share of clients open emails on their phones, so poor mobile formatting can quickly lose their attention."],
["What should a consultant do if an email bounces back as undeliverable?","Ignore it and assume the client will follow up","Verify the email address and attempt an alternative contact method such as phone or WhatsApp","Mark the lead as lost permanently","Resend the identical email repeatedly",1,"Verifying the address and trying an alternative contact method ensures a bounced email doesnt simply end the opportunity."],
["Why is consistency in tone and branding across email templates important for a travel company?","It has no impact on client perception","It reinforces professionalism and brand recognition, building trust over multiple touchpoints","Consistency only matters for large corporations","Clients prefer inconsistent, varied tones",1,"Consistent tone and branding reinforces professionalism and brand recognition, building trust across every client touchpoint."]
],
ts:[
["The purpose of a needs analysis at the start of a travel sales call is:","To check the clients financial status","To understand their travel desires, constraints and expectations so recommendations are relevant","To deliver a product script","To check if they have booked with a competitor",1,"A thorough needs analysis ensures all subsequent recommendations are tailored, significantly improving conversion likelihood."],
["The first thing to do when making or receiving a travel sales call is:","Quote the cheapest price immediately","Ask for credit card details","Start reading from a brochure","Introduce yourself and your company, confirm availability to speak and invite the client to share their plans",3,"A proper introduction and checking availability shows respect for the clients time and sets a professional tone."],
["When a client says I need to think about it, the most effective response is:","OK goodbye","Immediately offer a large discount","Tell them prices increase tomorrow (if untrue)","Ask what specific aspect they need to consider, address any concerns and propose a specific callback time",3,"Identifying the real concern and committing to a follow-up time is far more effective than leaving without a clear next step."],
["Active listening in a tele-sales context means:","Just staying silent while the client talks","Taking notes only","Waiting for your turn to speak","Fully concentrating, asking clarifying questions and reflecting back to confirm understanding",3,"Active listening builds trust, ensures the client feels heard and provides the information needed for relevant recommendations."],
["The feel, felt, found technique in tele-sales is used to:","Close a booking quickly","Transfer a call to a manager","End an unsuccessful call","Handle objections with empathy by normalising the clients concern and offering a positive reframe",3,"The technique acknowledges the clients concern, normalises it and then redirects toward a positive experience others have found."],
["The most effective assumptive closing question for a travel sales call is:","Do you want to book or not?","Are you sure you want to spend that much?","Is that your final answer?","Shall I hold those dates while we confirm the details?",3,"An assumptive close progresses naturally as if agreement has been reached, reducing pressure while moving toward confirmation."],
["When a client mentions finding a cheaper price online, the most strategic response is:","Immediately match the price","Give up on the sale","Tell them the online price must be wrong","Ask them to read out exactly what the online price includes, then compare like-for-like",3,"Understanding exactly what the competitor price includes often reveals meaningful differences that justify your offer."],

async function saveLb(name,score,cat,answers){try{const data=await fetchAll();const sc=data.scores||{};const keys=[monthKey(),weekKey()];keys.forEach(key=>{let b=sc[key]||[];const i=b.findIndex(e=>e.name.toLowerCase()===name.toLowerCase()&&e.cat===cat);const ent={name,score,cat,date:new Date().toISOString(),answers};if(i>=0){if(b[i].score<score)b[i]=ent;}else b.push(ent);b.sort((a,z)=>z.score-a.score);sc[key]=b.slice(0,30);});await fetch(JBURL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JBKEY},body:JSON.stringify({scores:sc})});}catch(e){console.error('LB save error:',e);}}

// ── UTILITIES ──────────────────────────────────────────────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function shuffleOptions(q){
  const opts=[q[1],q[2],q[3],q[4]];
  const idxs=[0,1,2,3];
  for(let i=idxs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idxs[i],idxs[j]]=[idxs[j],idxs[i]];}
  const newOpts=idxs.map(i=>opts[i]);
  const newCorrect=idxs.indexOf(q[5]);
  return [q[0],newOpts[0],newOpts[1],newOpts[2],newOpts[3],newCorrect,q[6]];
}
function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function app(){return document.getElementById('app');}
function hdr(back){return `<div class="hdr"><div class="logo">THOMPSONS <b>FOR TRAVEL</b></div>${back?`<button class="bk" onclick="${back}">&#8592;</button>`:''}</div>`;}
function pbtn(lbl,fn){return `<button class="pb" onclick="${fn}">${lbl}</button>`;}
function sbtn(lbl,fn){return `<button class="sb" onclick="${fn}">${lbl}</button>`;}
