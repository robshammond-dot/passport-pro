lc:[
["What is the industry best-practice maximum first response time for a live chat travel enquiry?","10 minutes","5 minutes","Under 60 seconds","30 minutes",2,"Responding within 60 seconds dramatically reduces the risk of the visitor leaving the site; longer waits see significant drop-off."],
["How many live chat conversations is it best practice to handle simultaneously?","1 only","2 to 3","5 to 7","As many as possible",1,"Handling 2 to 3 simultaneously is optimal; beyond this, response quality and personalisation decline noticeably."],
["When a live chat client finds the price higher than expected, the most effective response is:","Immediately offer a discount","Apologise and end the chat","Acknowledge the concern, highlight the value and explore what matters most to the client","Send them to a competitor",2,"A value-focused response that probes the clients priorities is more effective than reflexively discounting."],
["What are canned responses and why are they useful?","Spam messages to avoid","Pre-written templates for common questions that improve speed and consistency","Computer-generated auto-replies only","Recorded voice messages",1,"Canned responses allow agents to answer common questions quickly and consistently while still personalising the reply."],
["If a live chat query requires significant research time, the best approach is:","Ask the client to phone instead","Leave them waiting with no communication","Acknowledge the query, explain you are researching and give a time estimate","Send a generic brochure link",2,"Honest communication with a realistic timeframe prevents frustration and keeps the client engaged during a research pause."],
["A professional close to a live chat conversation should always include:","Just closing the window","A summary of what was discussed, confirmed next steps and an offer to reconnect","Only a rating request","An automatic disconnect",1,"A proper close clarifies what was agreed, confirms the next step and leaves the client feeling well looked after."],
["The most appropriate tone for travel live chat is:","Very formal and corporate only","Extremely casual with slang","Warm, helpful and conversational, adapting to the clients tone while remaining professional","Fully scripted throughout",2,"Live chat calls for a conversational, warm approach that mirrors the client while maintaining professional knowledge and standards."],
["Proactive chat in a travel website context means:","Sending aggressive promotional messages","An automated invitation to chat triggered when a visitor meets certain conditions (such as 30 seconds on a destination page)","Sending bulk promotional messages","Bot-only responses throughout",1,"Proactive chat invites visitors at a relevant moment in their browsing, increasing the chance of converting passive interest into an active enquiry."],
["When a client in live chat is clearly frustrated, what should you do first?","End the chat immediately","Match their tone","Transfer immediately without acknowledgment","Acknowledge their feelings sincerely before attempting to resolve the issue",3,"Clients need to feel heard before they are ready to accept a solution; empathy before problem-solving is the key principle."],
["Once a client in live chat clearly indicates intent to book, you should:","Keep chatting about other destination options","Ask if they want to think about it more","Transfer to a manager","Move efficiently to confirm details and lock in the booking while enthusiasm is at its peak",3,"Buying intent should be acted on promptly; allowing momentum to fade is one of the most common conversion mistakes."],
["The best way to ask about a clients budget in live chat is:","What is your budget? (blunt)","Can you afford a 5-star hotel?","Do not ask about budget at all","To help tailor the best options, do you have a rough budget range in mind?",3,"A value-framed, soft approach to budget is far less intrusive and more likely to receive an honest, useful response."],
["When a live chat visitor says they are just browsing, the best approach is:","End the chat","Send a full price list","Ask for their email address immediately","Ask where they dream of travelling next to start a genuine conversation",3,"Open-ended aspirational questions engage casual browsers and can convert them into active enquiries without any pressure."],
["What should be gathered early in a live chat travel enquiry?","Credit card details","Destination, travel dates, number of travellers and approximate budget","Home address and employer details","Their name only",1,"Gathering key trip details early enables personalised, relevant recommendations rather than generic responses."],
["After a dropped internet connection during a live chat, what is the professional response?","Do nothing and wait","Apologise in a future chat session only","Proactively send a follow-up email acknowledging the interruption and continuing the conversation","Call an unrelated phone number",2,"Reaching out by email after a dropped connection shows professionalism and prevents the client feeling abandoned."],
["What is first contact resolution in the live chat context?","Closing the chat window immediately","The first chat of the working day","Resolving the clients query fully in the initial interaction without needing a follow-up","A promotional response code",2,"First contact resolution means the client leaves the chat with their need fully met, which strongly correlates with satisfaction scores."]
],
em:[
["The single most important element of a travel sales email is:","A long, detailed itinerary","Formal corporate language","A compelling subject line that motivates the recipient to open the email","Company legal disclaimers",2,"The subject line determines whether an email is ever opened; even a perfect email is wasted if it is never read."],
["The recommended length for a travel proposal email is:","As long as possible to show thoroughness","Exactly 500 words","Short enough to read on a mobile, focused on key highlights with an offer to share more detail","One paragraph only",2,"Concise, mobile-friendly emails with a single clear call to action consistently outperform long, detailed proposals."],
["True personalisation in a travel email means:","Using the clients first name only","Adding a logo","Tailoring the content and recommendations to the clients specific travel history, stated preferences and current enquiry","Using colourful template designs",2,"Meaningful personalisation references the clients past travel, preferences and enquiry context rather than just inserting a name."],
["The recommended follow-up timing after sending a travel quote with no response is:","Immediately upon sending","After 2 weeks","After 2 to 3 business days","Never; wait for the client to respond",2,"Following up after 2 to 3 business days keeps the opportunity alive without feeling intrusive."],
["The most effective subject line format for a Mauritius proposal email is:","Travel Offer August","Important message from Thompsons For Travel","Hi","Your Mauritius Escape [Month of Departure]",3,"Destination-specific, personalised and evocative subject lines significantly outperform generic alternatives in open rates."],
["A travel quote email should always include:","Just the price","Price, inclusions, exclusions, validity date and a personal recommendation note","A full terms and conditions document only","The itinerary PDF only",1,"A complete quote communicates what is included, what is excluded, when the price expires and a personalised reason to proceed."],
["The best time of the week to send a sales follow-up email for highest open rates is:","Friday afternoon","Sunday evening","Monday early morning","Tuesday to Thursday morning",3,"Research consistently shows Tuesday to Thursday mornings achieve the highest B2C email open rates."],
["A call to action (CTA) in a travel email is:","A company slogan","A legal notice","A request for the client to phone the office","A clear instruction on the readers next step, such as Reply to confirm your dates",3,"Every effective sales email should contain one clear, singular call to action guiding the reader toward the desired next step."],
["Why should a price validity date always be included in a travel quote email?","It is a legal requirement only","It creates urgency, manages expectations and protects the consultant if airfares or rates change","It slows down the process","It is not important",1,"A validity date creates a natural reason to act and protects the consultant from being held to a price that is no longer achievable."],
["When a client replies to a quote with a price objection, the most effective response is:","Immediately send a lower quote","Acknowledge their feedback, ask what budget they had in mind and explore which aspects of the trip matter most","Ignore the objection","Apologise and end the email thread",1,"Understanding the specific nature of the objection before adjusting the proposal leads to a better outcome than an immediate discount."],
["A drip email campaign in a travel context is:","Emails about waterfall destinations","A single email with multiple discount tiers","A series of relevant emails delivered over time to nurture a lead from interest through to booking","Emails sent only in rainy weather",2,"A drip sequence guides prospects progressively from inspiration to enquiry to booking through timed, relevant content."],
["When emailing a repeat client, the most effective opening references:","The companys founding date","Their previous travel experience booked through you","The latest newsletter","A cold generic introduction",1,"Referencing a clients previous trip signals genuine knowledge of them as an individual, immediately building rapport and relevance."],
["What is the preview text in a sales email?","The subject line","An image caption","The footer contact details","The short text visible in the inbox below the subject line before the email is opened",3,"Preview text gives a second opportunity to encourage opens after the subject line and should complement it with additional context."],
["South Africas POPIA legislation is relevant to travel email marketing because:","It requires emails to be in Afrikaans","It governs personal data protection; unsubscribe requests must be honoured immediately","It only applies to international companies","It requires all emails to include a price",1,"POPIA requires responsible handling of personal information; failing to honour unsubscribe requests can result in regulatory action."],
["What makes a travel proposal email stand out above competitors?","Always having the lowest price","Personalisation, evocative destination narrative, quality imagery and clear reasons to book now","Being the longest email","Using company letterhead only",1,"Personalised, experience-focused proposals consistently outperform generic price-list-style emails in conversion."]
],
ts:[
["The purpose of a needs analysis at the start of a travel sales call is:","To check the clients financial status","To understand their travel desires, constraints and expectations so recommendations are relevant","To deliver a product script","To check if they have booked with a competitor",1,"A thorough needs analysis ensures all subsequent recommendations are tailored, significantly improving conversion likelihood."],
["The first thing to do when making or receiving a travel sales call is:","Quote the cheapest price immediately","Ask for credit card details","Start reading from a brochure","Introduce yourself and your company, confirm availability to speak and invite the client to share their plans",3,"A proper introduction and checking availability to speak shows respect for the clients time and sets a professional tone."],
["When a client says I need to think about it, the most effective response is:","OK goodbye","Immediately offer a large discount","Tell them prices increase tomorrow (if untrue)","Ask what specific aspect they need to consider, address any concerns and propose a specific callback time",3,"Identifying the real concern behind this phrase and committing to a follow-up time is far more effective than leaving without a clear next step."],
["Active listening in a tele-sales context means:","Just staying silent while the client talks","Taking notes only","Waiting for your turn to speak","Fully concentrating, asking clarifying questions and reflecting back to confirm understanding",3,"Active listening builds trust, ensures the client feels heard and provides the information needed for relevant recommendations."],
["The feel, felt, found technique in tele-sales is used to:","Close a booking quickly","Transfer a call to a manager","End an unsuccessful call","Handle objections with empathy by normalising the clients concern and offering a positive reframe",3,"The technique acknowledges the clients concern, normalises it and then redirects toward a positive experience others have found."],
["The most effective assumptive closing question for a travel sales call is:","Do you want to book or not?","Are you sure you want to spend that much?","Is that your final answer?","Shall I hold those dates while we confirm the details?",3,"An assumptive close progresses naturally as if agreement has been reached, reducing pressure while moving toward confirmation."],
["When a client mentions finding a cheaper price online, the most strategic response is:","Immediately match the price","Give up on the sale","Tell them the online price must be wrong","Ask them to read out exactly what the online price includes, then compare like-for-like",3,"Understanding exactly what the competitor price includes often reveals meaningful differences that justify your offer."],
["Upselling in travel tele-sales means:","Selling at higher volume","Recommending a complementary add-on","Transferring the call to a senior consultant","Encouraging the client to upgrade to a higher category product, such as from a 4-star to a 5-star hotel",3,"Upselling increases both revenue and client satisfaction by offering a meaningful enhancement to what the client is already interested in."],
["Cross-selling in travel tele-sales means:","Selling to a different department","Transferring calls to another agent","Selling competing products","Recommending complementary add-ons such as travel insurance, car hire, excursions or transfers alongside the main booking",3,"Cross-selling enhances the clients overall travel experience and represents genuine additional value when done appropriately."],
["Conversion rates for outbound calls after an online enquiry peak when contact is made:","Within 24 hours","Within a week","Only after an email has been sent first","Within 5 minutes to 1 hour of the enquiry being submitted",3,"Research consistently shows conversion rates are highest when calls are made within minutes of enquiry submission while interest is at its peak."],
["After a successful booking call, the consultant should:","End the call immediately","Ask for referrals immediately","Transfer to accounts only","Thank the client, confirm all key details verbally, explain what happens next and send a written confirmation promptly",3,"A warm, organised close with confirmed next steps and a prompt written summary reduces cancellations and builds confidence."],
["Silence on a call after presenting the price should be handled by:","Immediately filling the silence with talking","Lowering the price immediately","Assuming lack of interest and wrapping up","Waiting comfortably for the client to respond; silence often signals consideration",3,"Filling silence nervously after presenting a price weakens the consultants negotiating position; patient silence is a professional skill."],
["When a client is upset about a past booking issue, what should you do first?","Defend the company immediately","Argue the facts of the situation","Transfer immediately","Allow them to express their frustration fully, then empathise sincerely before moving to resolution",3,"Empathy before problem-solving is essential; clients must feel genuinely heard before they are receptive to any solution offered."],
["A callback promise must always be kept because:","It is a legal requirement","It is a promise to call if prices drop","Broken callback promises signal unreliability to a client about to trust you with a significant holiday booking","It is only relevant if the client insists",2,"A missed callback communicates to the client that you cannot be trusted with small commitments, let alone large financial ones."],
["The most important thing to agree on at the end of a call without an immediate booking is:","Nothing specific; just say goodbye","Ask them to call back when they are ready","Send only a generic follow-up email","A specific next action with a committed date and time: I will send the proposal today and call you Thursday at 10am, does that work?",3,"A specific, mutually agreed next step with a committed time dramatically increases the likelihood of a follow-up conversation occurring."]
]

function getWeek(d){const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-day);const ys=new Date(Date.UTC(u.getUTCFullYear(),0,1));return Math.ceil((((u-ys)/86400000)+1)/7);}
function lbKey(){const n=new Date();return S.period==='monthly'?`tft_lb_${n.getFullYear()}_${n.getMonth()+1}`:`tft_lb_w_${n.getFullYear()}_${getWeek(n)}`;}
async function fetchAll(){try{const r=await fetch(JBURL+'/latest',{headers:{'X-Master-Key':JBKEY}});const d=await r.json();return d.record||{scores:{}};}catch{return{scores:{}};}}
async function getLb(){const data=await fetchAll();return(data.scores||{})[lbKey()]||[];}
async function saveLb(name,score,cat){try{const data=await fetchAll();const sc=data.scores||{};const key=lbKey();let b=sc[key]||[];const i=b.findIndex(e=>e.name.toLowerCase()===name.toLowerCase()&&e.cat===cat);const ent={name,score,cat,date:new Date().toISOString()};if(i>=0){if(b[i].score<score)b[i]=ent;}else b.push(ent);b.sort((a,z)=>z.score-a.score);sc[key]=b.slice(0,30);await fetch(JBURL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JBKEY},body:JSON.stringify({scores:sc})});}catch(e){console.error('LB save error:',e);}}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

}

function renderName(){
  app().innerHTML=`${hdr('goHome()')}<div class="card"><h2 style="margin-top:0">What&#39;s your name?</h2><p style="color:#666;font-size:14px;margin:4px 0 0">Your name appears on the leaderboard</p><input type="text" id="ni" placeholder="Enter your name" value="${h(S.name)}" onkeydown="if(event.key==='Enter')setName()"><button class="pb" onclick="setName()">Let&#39;s Go &#8594;</button></div>`;
  setTimeout(()=>document.getElementById('ni')&&document.getElementById('ni').focus(),100);
}

function renderCategories(){
  const dest=CATS.filter(c=>c.type==='dest');
  const skill=CATS.filter(c=>c.type==='skill');
  const cb=c=>`<button class="cb" onclick="pickCat('${c.id}')"><span style="font-size:22px;display:block;margin-bottom:4px">${c.emoji}</span><span style="font-size:11px;font-weight:700;color:#0A52A0;line-height:1.2">${c.name}</span></button>`;
  app().innerHTML=`${hdr('goHome()')}<div class="inner"><h2 style="margin-top:12px">Hi ${h(S.name)}! &#128075;</h2><p class="sub" style="margin-bottom:20px">Pick a category to start your round</p><p class="sl">&#127757; DESTINATIONS</p><div class="g3">${dest.map(cb).join('')}</div><p class="sl">&#128188; SALES SKILLS</p><div class="g3">${skill.map(cb).join('')}</div></div>`;
}

function renderQuiz(){
  const q=S.qs[S.qi];
  const labs=['A','B','C','D'];
  const mult=S.streak>=5?2:S.streak>=3?1.5:1;
  const tPct=(S.tLeft/25)*100;
  const tCol=S.tLeft>10?'#00AEEF':S.tLeft>5?'#FFA500':'#FF4444';
  app().innerHTML=`${hdr()}
<div class="inner">
  <div class="sr">
    <span style="color:#777;font-size:13px;font-weight:600">Q${S.qi+1} / ${S.qs.length}</span>
    <span style="color:#0A52A0;font-weight:800;font-size:16px" id="sc">&#11088; ${S.score.toLocaleString()}</span>
    ${S.streak>=3?`<span class="stk">&#128293; &times;${mult}</span>`:''}
  </div>
  <div class="pgb"><div style="width:${(S.qi/S.qs.length)*100}%"></div></div>
  <div class="tmb"><div id="tw" style="width:${tPct}%;background:${tCol}"></div></div>
  <div class="qb"><p class="qt">${h(q[0])}</p></div>
  <div class="os">${[0,1,2,3].map(i=>`<button class="op" id="op${i}" onclick="handlePick(${i})"><span class="ol">${labs[i]}</span>${h(q[i+1])}</button>`).join('')}</div>
  <div id="fb"></div>
</div>`;
}

function renderResults(){
  const ok=S.answers.filter(a=>a.ok).length;
  const pct=Math.round((ok/S.qs.length)*100);
  const medal=pct>=80?'&#127942;':pct>=60?'&#127775;':'&#128218;';
  const msg=pct>=80?'Outstanding!':pct>=60?'Good effort!':'Keep studying!';
  app().innerHTML=`${hdr()}
<div class="inner">
  <div class="rb">
    <div style="font-size:48px;margin-bottom:8px">${medal}</div>
    <h2 style="color:#fff;font-size:26px;margin:0 0 4px">${S.score.toLocaleString()} pts</h2>
    <p style="color:#00AEEF;font-weight:700;margin:0 0 6px">${ok}/${S.qs.length} correct (${pct}%) &mdash; ${msg}</p>
    <p style="color:rgba(255,255,255,.7);font-size:13px;margin:0">${S.cat.emoji} ${h(S.cat.name)}</p>
  </div>
  <div style="background:#fff;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(10,82,160,.08)">
    <p style="color:#0A52A0;font-weight:800;font-size:11px;letter-spacing:2px;margin:0 0 12px">QUESTION REVIEW</p>
    <div class="rv">${S.answers.map(a=>`<div class="rvi"><p style="font-size:13px;font-weight:600;margin:0 0 3px">${a.ok?'&#9989;':'&#10060;'} ${h(a.q)}</p>${!a.ok?`<p style="font-size:12px;color:#999;margin:0">Correct: ${h(a.ca)}</p>`:''}</div>`).join('')}</div>
  </div>
  ${pbtn('&#127919; Play Again','goCategories()')}
  ${sbtn('&#127942; View Leaderboard','goLb()')}
</div>`;
}

async function renderLeaderboard(){
  app().innerHTML=`${hdr('goHome()')}
<div class="inner" style="padding-top:16px">
  <div style="text-align:center;padding:48px 20px;color:#888"><div style="font-size:40px;margin-bottom:12px">&#9203;</div><p style="font-size:14px">Loading scores...</p></div>
</div>`;
  const board=await getLb();
  app().innerHTML=`${hdr('goHome()')}
<div class="inner">
  <h2 style="margin-top:12px">&#127942; Leaderboard</h2>
  <div class="lt">
    <button class="ltb ${S.period==='monthly'?'on':'off'}" onclick="setPeriod('monthly')">Monthly</button>
    <button class="ltb ${S.period==='weekly'?'on':'off'}" onclick="setPeriod('weekly')">Weekly</button>
  </div>
  ${board.length===0
    ?`<div style="text-align:center;padding:48px 20px;color:#bbb"><div style="font-size:48px;margin-bottom:12px">&#127757;</div><p style="font-size:15px">No scores yet &mdash; be the first to play!</p></div>`
    :`<div class="ll">${board.slice(0,20).map((e,i)=>`<div class="lr${e.name===S.name?' me':''}"><div class="lrk" style="background:${i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':'#F0F0F0'};color:${i<3?'#fff':'#999'}">${i+1}</div><div style="flex:1;min-width:0"><p style="margin:0;font-weight:700;font-size:14px;color:#0A52A0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h(e.name)}${e.name===S.name?' (you)':''}</p><p style="margin:0;font-size:11px;color:#aaa">${h(e.cat)}</p></div><span style="font-weight:800;color:#0A52A0;font-size:16px;margin-left:8px">${e.score.toLocaleString()}</span></div>`).join('')}</div>`}
  ${pbtn('&#127919; Play Now','goPlay()')}
  <p class="note">&#127758; Scores are shared across all players in real time!</p>
</div>`;
}

// ============================================================
// GAME LOGIC
// ============================================================
function stopTimer(){clearInterval(S.timer);clearTimeout(S.fbto);}

function startTimer(){
  S.tLeft=25;stopTimer();
  S.timer=setInterval(()=>{
    S.tLeft--;
    const tw=document.getElementById('tw');
    if(tw){const p=(S.tLeft/25)*100;const c=S.tLeft>10?'#00AEEF':S.tLeft>5?'#FFA500':'#FF4444';tw.style.width=p+'%';tw.style.background=c;}
    if(S.tLeft<=0){stopTimer();handleTimeout();}
  },1000);
}

function handleTimeout(){
  if(S.showFb)return;
  const q=S.qs[S.qi];
  S.picked=-1;S.showFb=true;S.streak=0;
  S.answers.push({q:q[0],ok:false,pts:0,ua:'No answer',ca:q[q[5]+1],ex:q[6]});
  showFb(false,'Time\'s up!',q[6]);
  [0,1,2,3].forEach(i=>{const el=document.getElementById('op'+i);if(el){el.disabled=true;if(i===q[5])el.classList.add('ok');}});
  S.fbto=setTimeout(advance,1800);
}

function handlePick(idx){
  if(S.picked!==null||S.showFb)return;
  stopTimer();
  const q=S.qs[S.qi];
  const ok=idx===q[5];
  const ns=ok?S.streak+1:0;
  const mult=ns>=5?2:ns>=3?1.5:1;
  const pts=ok?Math.floor((100+Math.floor((S.tLeft/25)*50))*mult):0;
  S.picked=idx;S.showFb=true;S.streak=ns;
  if(ok)S.score+=pts;
  S.answers.push({q:q[0],ok,pts,ua:q[idx+1],ca:q[q[5]+1],ex:q[6]});
  [0,1,2,3].forEach(i=>{const el=document.getElementById('op'+i);if(el){el.disabled=true;if(i===q[5])el.classList.add('ok');else if(i===idx&&!ok)el.classList.add('ng');}});
  const sc=document.getElementById('sc');if(sc)sc.textContent='⭐ '+S.score.toLocaleString();
  showFb(ok,ok?'Correct!':'Not quite.',q[6]);
  S.fbto=setTimeout(advance,1800);
}

function showFb(ok,label,expl){
  const el=document.getElementById('fb');
  if(el)el.innerHTML=`<div class="fbx ${ok?'fok':'fng'}"><strong>${ok?'&#9989;':'&#10060;'} ${label}</strong> ${h(expl)}</div>`;
}

function advance(){
  S.showFb=false;S.picked=null;
  const next=S.qi+1;
  if(next>=S.qs.length){endRound();}
  else{S.qi=next;renderQuiz();startTimer();}
}

function endRound(){
  saveLb(S.name,S.score,S.cat.name);
  S.scr='results';renderResults();
}

function startQuiz(cat){
  S.cat=cat;
  const bank=QB[cat.id]||[];
  S.qs=shuffle(bank).slice(0,Math.min(10,bank.length));
  S.qi=0;S.score=0;S.streak=0;S.answers=[];S.picked=null;S.showFb=false;
  S.scr='quiz';renderQuiz();startTimer();
}

// ============================================================
// NAVIGATION
// ============================================================
function goHome(){stopTimer();S.scr='home';renderHome();}
function goPlay(){S.scr=S.name?'categories':'name';S.name?renderCategories():renderName();}
function goCategories(){S.scr='categories';renderCategories();}
function goLb(){S.scr='leaderboard';renderLeaderboard();}
function setName(){const v=document.getElementById('ni')?.value?.trim();if(v){S.name=v;goCategories();}}
function pickCat(id){const c=CATS.find(x=>x.id===id);if(c)startQuiz(c);}
function setPeriod(p){S.period=p;renderLeaderboard();}

// ============================================================
// INIT
// ============================================================
renderHome();
</script>
</body>
</html>
